version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html
      - ./frontend/dist:/var/www/html/public/build
    depends_on:
      - php
    networks:
      - gfrc-net

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=gfrc_db
      - DB_USERNAME=gfrc_user
      - DB_PASSWORD=gfrc_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - gfrc-net

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gfrc_db
      POSTGRES_USER: gfrc_user
      POSTGRES_PASSWORD: gfrc_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - gfrc-net

  redis:
    image: redis:7-alpine
    networks:
      - gfrc-net

  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    profiles:
      - dev
    networks:
      - gfrc-net

volumes:
  postgres_data:

networks:
  gfrc-net:
    driver: bridge
